<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
        <link rel="stylesheet" href="/common/styles/shared.css" />
        <link rel="stylesheet" href="/common/styles/auth.css" />
        <link rel="stylesheet" href="/register/style.css" />
        <!-- Google Fonts: Lexend for headings, Roboto Flex for body/UI text -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lexend:wght@600;700&family=Roboto+Flex:wght@400;500;600&display=swap"
            rel="stylesheet" />
        <!-- Material Symbols (Google's icon font) -->
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
            rel="stylesheet" />
        <script type="module" src="/register/app.js" defer></script>
        <title>Register · NutriSimple</title>
    </head>
    <body>
        <header>
            <span class="material-symbols-rounded header-icon" aria-hidden="true">favorite</span>
            <h2>NutriSimple</h2>
            <a href="/login" id="log-in-link">
                <span class="material-symbols-rounded" aria-hidden="true">login</span> Log in</a
            >
        </header>

        <section>
            <div class="auth-blob" aria-hidden="true"></div>

            <div class="auth-card">
                <h3>Create your account</h3>
                <br />
                <p class="error-message" id="register-error" role="alert"></p>

                <form id="register-form">
                    <div class="field">
                        <span class="material-symbols-rounded field-icon" aria-hidden="true"
                            >person</span
                        >
                        <input
                            type="text"
                            minlength="4"
                            id="username"
                            name="userName"
                            required
                            placeholder=" " />
                        <label for="username">Username</label>
                    </div>

                    <div class="field field--password">
                        <span class="material-symbols-rounded field-icon" aria-hidden="true"
                            >lock</span
                        >
                        <input
                            type="password"
                            name="password"
                            id="password"
                            minlength="6"
                            required
                            placeholder=" " />
                        <label for="password">Password</label>
                        <button
                            type="button"
                            class="toggle-password"
                            id="toggle-password"
                            aria-label="Show password">
                            <span class="material-symbols-rounded" aria-hidden="true"
                                >visibility</span
                            >
                        </button>
                    </div>

                    <div><input type="submit" value="Register" /></div>
                </form>
            </div>
        </section>
    </body>
</html>
