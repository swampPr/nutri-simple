services:
  app:
    image: swampc/nutri-simple-app:latest
    ports:
      - "8000:8000"
    env_file:
        - .env
    depends_on:
      - db
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nutrisimple
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql  
        

volumes:
  postgres_data:
